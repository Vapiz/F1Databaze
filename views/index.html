<div class="card">
  <h2>Přidat šampiona</h2>
  <form id="createForm">
    <div class="row">
      <label>Jméno:</label>
      <input name="jmeno" required />
    </div>
    <div class="row">
      <label>Tým:</label>
      <input name="tym" required />
    </div>
    <div class="row">
      <label>Počet titulů:</label>
      <input type="number" name="tituly" min="0" required />
    </div>
    <div class="row">
      <label>Národnost:</label>
      <input name="stat" required />
    </div>
    <button type="submit">Uložit do JSON</button>
    <p id="createMsg" class="muted"></p>
  </form>
</div>

<div class="card">
  <h2>Seznam šampionů</h2>
  
  <form action="/" method="GET" class="filter-form">
    <input type="text" name="search" placeholder="Hledat podle jména nebo týmu...">
    <button type="submit">Filtrovat</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Jméno</th>
        <th>Tým</th>
        <th>Akce</th>
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
</div>
