<div class="card">
  <h2>Přidat šampiona</h2>
  <form id="createForm">
    <div class="form-grid">
      <div class="row">
        <label>Jméno:</label>
        <input name="jmeno" placeholder="např. Max Verstappen" required />
      </div>
      <div class="row">
        <label>Tým:</label>
        <input name="tym" placeholder="např. Red Bull Racing" required />
      </div>
      <div class="row">
        <label>Počet titulů:</label>
        <input type="number" name="tituly" min="0" placeholder="0" required />
      </div>
      <div class="row">
        <label>Národnost:</label>
        <input name="stat" placeholder="např. Nizozemsko" required />
      </div>
    </div>

    <div class="row">
      <label>Fotka jezdce (nepovinné):</label>
      <input type="file" name="fotka" accept="image/*" style="padding: 10px; cursor: pointer;" />
    </div>

    <button type="submit">Přidat jezdce</button>
    <p id="createMsg" class="muted"></p>
  </form>
</div>

<div class="card">
  <h2>Seznam šampionů</h2>
  
  <form action="/" method="GET" class="filter-bar">
    <div class="filter-item">
      <label>Jméno:</label>
      <input type="text" name="search" placeholder="Hledat jezdce..." value="{{searchVal}}">
    </div>
    
    <div class="filter-item">
      <label>Tým:</label>
      <select name="tym">
        <option value="">Všechny týmy</option>
        {{tymOptions}}
      </select>
    </div>

    <div class="filter-item">
      <label>Min. titulů:</label>
      <input type="number" name="minTituly" placeholder="0" value="{{minTitulyVal}}">
    </div>

    <div class="filter-actions">
      <button type="submit">Filtrovat</button>
      <a href="/" class="btn btn-upravit">Zrušit</a>
    </div>
  </form>
  
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Jméno</th>
        <th>Tým</th>
        <th>Akce</th>
      </tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
</div>
